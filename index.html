<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HugoDev - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card login-only-card">
      <div class="login-brand">
        <div class="brand-icon">H</div>
        <div>
          <strong>HugoDev</strong>
          <span>Gestión de cuadrantes y facturación</span>
        </div>
      </div>
      <h1>Iniciar sesión</h1>
      <form id="login-form" class="login-form">
        <label class="field-group field-user">
          <input id="login-username" placeholder="Usuario" required>
        </label>
        <label class="field-group field-lock">
          <input id="login-password" type="password" placeholder="Contraseña" required>
        </label>
        <div class="login-controls">
          <label class="remember"><input type="checkbox" id="remember-me"> Recordar contraseña</label>
        </div>
        <button type="submit" class="btn-login">Entrar</button>
      </form>
      <p id="login-msg" class="login-msg"></p>
    </section>
  </main>
  <script src="login.js"></script>
</body>
</html>
